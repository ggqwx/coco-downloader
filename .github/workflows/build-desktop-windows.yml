name: Build Desktop Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "desktop/**"
      - ".github/workflows/build-desktop-windows.yml"

jobs:
  build-windows:
    name: Windows x86_64
    runs-on: windows-2022

    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: desktop/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Qt resources
        run: python -m PyQt5.pyrcc_main app/resource/resource.qrc -o app/common/resource.py

      - name: Build executable with Nuitka
        shell: pwsh
        run: |
          $APP_VERSION = python -c "from app.common.setting import VERSION; print(VERSION.lstrip('vV'))"
          Write-Host "APP_VERSION=$APP_VERSION"
          "APP_VERSION=$APP_VERSION" >> $env:GITHUB_ENV
          python deploy.py

      - name: Download Inno Setup Chinese translation
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl" `
            -OutFile "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        with:
          path: desktop/CoCo-downloader.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: CoCo-downloader-v${{ env.APP_VERSION }}-Windows-x86_64-Setup
          path: desktop/dist/CoCo-downloader-v${{ env.APP_VERSION }}-Windows-x86_64-Setup.exe
          if-no-files-found: error

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: CoCo-downloader-v${{ env.APP_VERSION }}-Windows-x86_64-Portable
          path: desktop/build/CoCo-downloader.dist
          if-no-files-found: error
