name: Build Desktop macOS Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "desktop/**"
      - ".github/workflows/build-desktop-macos.yml"

jobs:
  build-macos:
    name: macOS ${{ matrix.architecture }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            architecture: x86_64
            remove_openssl: true
          - runner: macos-14
            architecture: arm64
            remove_openssl: false
    runs-on: ${{ matrix.runner }}

    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Remove problematic brew OpenSSL
        if: matrix.remove_openssl
        run: |
          brew remove --force --ignore-dependencies openssl@3
          brew cleanup openssl@3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: desktop/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Qt resources
        run: python -m PyQt5.pyrcc_main app/resource/resource.qrc -o app/common/resource.py

      - name: Build app bundle with Nuitka
        run: |
          APP_VERSION=$(python3 -c "from app.common.setting import VERSION; print(VERSION.lstrip('vV'))")
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
          python deploy.py
          chmod u+x "build/CoCo-downloader.app/Contents/MacOS/CoCo-downloader"
          rm -rf "build/CoCo-downloader.build"

      - name: Reinstall OpenSSL
        if: matrix.remove_openssl
        run: brew install openssl@3

      - name: Create DMG
        run: |
          rm -rf dmg
          mkdir -p dmg
          cp -R "build/CoCo-downloader.app" dmg/
          ln -s /Applications dmg/Applications
          hdiutil create \
            -srcfolder "dmg" \
            -volname "CoCo Downloader" \
            -fs HFS+ \
            -fsargs "-c c=64,a=16,e=16" \
            -format UDZO \
            -size 500m \
            "CoCo-downloader-v${APP_VERSION}-macOS-${{ matrix.architecture }}.dmg"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: CoCo-downloader-v${{ env.APP_VERSION }}-macOS-${{ matrix.architecture }}
          path: desktop/CoCo-downloader-v${{ env.APP_VERSION }}-macOS-${{ matrix.architecture }}.dmg
          if-no-files-found: error
